<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>运营助手</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Open AI 资讯会员</p>
          <h1>待开通</h1>
        </div>
        <button id="refreshBtn" class="icon-button" title="刷新" type="button">↻</button>
      </header>

      <section id="setupNotice" class="notice hidden">
        <strong>需要先配置接口</strong>
        <span>填写云函数 HTTP 地址和管理密钥后开始处理订单。</span>
        <button id="openOptionsBtn" type="button">去配置</button>
      </section>

      <section class="toolbar">
        <button id="openChatgptBtn" class="secondary-button" type="button">打开 ChatGPT</button>
        <button id="loadBtn" class="primary-button" type="button">加载任务</button>
      </section>

      <nav class="tabs" aria-label="运营功能">
        <button id="ordersTabBtn" class="tab-button tab-button--active" type="button">订单</button>
        <button id="newsTabBtn" class="tab-button" type="button">资讯</button>
        <button id="registerTabBtn" class="tab-button" type="button">注册</button>
      </nav>

      <section id="ordersPanel">
        <section id="summary" class="summary hidden">
          <span id="taskCount">0</span>
          <span>个订单等待人工开通</span>
        </section>

        <section id="emptyState" class="empty hidden">
          <p>暂无待开通订单</p>
          <span>支付成功后的订单会出现在这里。</span>
        </section>

        <section id="taskList" class="task-list"></section>
      </section>

      <section id="newsPanel" class="news-panel hidden">
        <div class="news-form-card">
          <div class="news-form-card__head">
            <div>
              <p class="eyebrow">AI资讯</p>
              <h2>上传真实资讯</h2>
            </div>
            <button id="fillCurrentTabBtn" class="secondary-button" type="button">读取当前页</button>
          </div>

          <label class="field">
            <span>头图</span>
            <div id="newsCoverDropzone" class="cover-dropzone" tabindex="0" role="button" aria-label="粘贴或选择头图">
              <img id="newsCoverPreview" class="cover-dropzone__preview hidden" alt="头图预览" />
              <div class="cover-dropzone__placeholder">
                <strong>粘贴头图或点击选择</strong>
                <small id="newsCoverStatus">复制网页图片后，点击这里按 Cmd/Ctrl + V</small>
              </div>
            </div>
            <input id="newsCover" class="cover-file-input" type="file" accept="image/png,image/jpeg,image/webp" />
          </label>
          <label class="field">
            <span>文章正文 Markdown</span>
            <textarea id="newsContentMarkdown" class="markdown-textarea" maxlength="20000" placeholder="粘贴 Grok 生成的公众号风格 Markdown 正文"></textarea>
          </label>
          <div class="field-grid">
            <label class="field">
              <span>来源</span>
              <input id="newsSourceName" placeholder="AIO" />
            </label>
            <label class="field">
              <span>作者</span>
              <input id="newsAuthorName" placeholder="@author" />
            </label>
          </div>

          <div class="field">
            <span>标签</span>
            <div id="newsTagsDropdown" class="tags-dropdown">
              <button id="newsTagsTrigger" class="tags-dropdown__trigger" type="button" aria-expanded="false">
                请选择标签（可多选）
              </button>
              <div id="newsTagsMenu" class="tags-dropdown__menu hidden"></div>
            </div>
          </div>

          <div class="field-grid field-grid--four">
            <label class="field">
              <span>浏览</span>
              <input id="newsViewCount" inputmode="numeric" placeholder="0" />
            </label>
            <label class="field">
              <span>点赞</span>
              <input id="newsLikeCount" inputmode="numeric" placeholder="0" />
            </label>
            <label class="field">
              <span>转发</span>
              <input id="newsRepostCount" inputmode="numeric" placeholder="0" />
            </label>
            <label class="field">
              <span>评论</span>
              <input id="newsCommentCount" inputmode="numeric" placeholder="0" />
            </label>
          </div>

          <div class="actions">
            <button id="clearNewsFormBtn" class="secondary-button" type="button">清空</button>
            <button id="submitNewsBtn" class="primary-button" type="button">上传发布</button>
          </div>
        </div>
      </section>

      <section id="registerPanel" class="register-panel hidden">
        <div class="register-card">
          <div class="news-form-card__head">
            <div>
              <p class="eyebrow">Apple Store</p>
              <h2>注册账号生成</h2>
            </div>
            <button id="generateAppleAccountBtn" class="secondary-button" type="button">随机生成</button>
          </div>

          <label class="field">
            <span>Apple Store 邮箱</span>
            <div class="copy-row">
              <input id="appleAccountEmail" placeholder="点击随机生成账号" />
              <button id="copyAppleAccountEmailBtn" type="button">复制</button>
            </div>
          </label>

          <label class="field">
            <span>手机号</span>
            <div class="copy-row">
              <input id="appleAccountMobile" value="1581090117" />
              <button id="copyAppleAccountMobileBtn" type="button">复制</button>
            </div>
          </label>

          <label class="field">
            <span>密码</span>
            <div class="copy-row">
              <input id="appleAccountPassword" placeholder="自动生成符合 Apple 要求的密码" />
              <button id="copyAppleAccountPasswordBtn" type="button">复制</button>
            </div>
          </label>

          <p class="helper-text">
            注册完成后点击保存，该账号会进入可用池；后续订单开通时会自动从可用池获取未绑定账号。
          </p>

          <div class="actions">
            <button id="clearAppleAccountBtn" class="secondary-button" type="button">清空</button>
            <button id="saveAppleAccountBtn" class="primary-button" type="button">保存账号</button>
          </div>
        </div>
      </section>

      <section id="confirmDialog" class="confirm-dialog hidden" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <div class="confirm-dialog__panel">
          <p class="eyebrow">确认操作</p>
          <h2 id="confirmTitle">确认已完成开通？</h2>
          <p class="confirm-dialog__desc">
            确认后会员会立刻开始计时，订单会从待开通列表移除。
          </p>
          <div class="confirm-dialog__meta">
            <span>订单号</span>
            <strong id="confirmOrderNo">-</strong>
          </div>
          <div class="confirm-dialog__actions">
            <button id="cancelFulfillBtn" class="secondary-button" type="button">取消</button>
            <button id="confirmFulfillBtn" class="primary-button danger-button" type="button">确认已开通</button>
          </div>
        </div>
      </section>

      <div id="toast" class="toast hidden" role="status" aria-live="polite">复制成功</div>
    </main>

    <template id="taskTemplate">
      <article class="task-card">
        <div class="task-card__head">
          <div>
            <p class="task-card__product"></p>
            <h2 class="task-card__plan"></h2>
          </div>
          <span class="task-card__amount"></span>
        </div>

        <dl class="meta-grid">
          <div>
            <dt>订单号</dt>
            <dd class="task-card__order"></dd>
          </div>
          <div>
            <dt>支付时间</dt>
            <dd class="task-card__paid-at"></dd>
          </div>
        </dl>

        <div class="credential">
          <label>账号</label>
          <div class="copy-row">
            <input class="task-card__email" readonly />
            <button class="copy-email" type="button">复制</button>
          </div>
        </div>

        <div class="credential">
          <label>密码</label>
          <div class="copy-row">
            <input class="task-card__password" readonly type="password" />
            <button class="copy-password" type="button">复制</button>
          </div>
        </div>

        <div class="credential">
          <label>邮箱验证码</label>
          <div class="copy-row">
            <input class="task-card__code" readonly placeholder="点击获取最近验证码" />
            <button class="fetch-code" type="button">获取</button>
          </div>
        </div>

        <div class="credential credential--apple">
          <label>Apple Store 账号</label>
          <div class="copy-row">
            <input class="task-card__apple-email" readonly placeholder="点击获取未绑定账号" />
            <button class="fetch-apple-account" type="button">获取</button>
          </div>
        </div>

        <div class="credential">
          <label>Apple Store 密码</label>
          <div class="copy-row">
            <input class="task-card__apple-password" readonly type="password" />
            <button class="copy-apple-password" type="button">复制</button>
          </div>
        </div>

        <textarea class="task-card__note" placeholder="处理备注，例如账号已注册、需重试"></textarea>

        <div class="actions">
          <button class="open-site secondary-button" type="button">打开官网</button>
          <button class="mark-processing secondary-button" type="button">处理中</button>
          <button class="mark-done primary-button" type="button">已开通</button>
        </div>
      </article>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
